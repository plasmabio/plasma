{% extends "page.html" %}

{% block main %}
{% if default_server.active %}
<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}
.app-frame {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  z-index: 1;
}
/* ---- side panel ---- */
.side-panel {
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10000;
  display: flex;
  flex-direction: row;
  align-items: center;
}
.side-toggle {
  width: 20px;
  height: 56px;
  padding: 0;
  border: none;
  border-radius: 6px 0 0 6px;
  background: rgba(80, 80, 80, 0.5);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: background 0.2s;
}
.side-toggle:hover {
  background: rgba(80, 80, 80, 0.85);
}
.side-menu {
  overflow: hidden;
  max-width: 0;
  transition: max-width 0.25s ease;
}
.side-menu-inner {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 8px;
  background: var(--jp-layout-color1, rgba(255,255,255,0.96));
  box-shadow: -3px 0 12px rgba(0,0,0,0.15);
  border-radius: 6px 0 0 6px;
  white-space: nowrap;
}
.side-panel.expanded .side-menu {
  max-width: 140px;
}
.side-panel.expanded .side-toggle {
  border-radius: 0;
}
/* ---- loading overlay ---- */
.iframe-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--jp-layout-color1, #fff);
}
.iframe-status {
  text-align: center;
}
</style>

<iframe
  class="app-frame"
  id="user-app-frame"
  src="{{ base_url }}user/{{ user.name }}/">
</iframe>

<div id="iframe-overlay" class="iframe-overlay">
  <div id="iframe-loading" class="iframe-status">
    <div class="spinner-border text-secondary" role="status"></div>
    <p class="mt-3">Chargement...</p>
  </div>
  <div id="iframe-error" class="iframe-status" style="display:none;">
    <p class="fs-5">Le serveur ne répond pas.</p>
    <button id="iframe-reload" class="btn btn-primary mt-2">Recharger</button>
  </div>
</div>

<div id="side-panel" class="side-panel">
  <div class="side-menu" id="side-menu">
    <div class="side-menu-inner">
      <button id="stop-server" class="btn btn-sm btn-danger w-100">
        <i class="fa fa-power-off me-1"></i>Stop
      </button>
      <button id="home-btn" class="btn btn-sm btn-outline-secondary w-100">
        <i class="fa fa-home me-1"></i>Home
      </button>
    </div>
  </div>
  <button id="side-toggle" class="side-toggle" aria-expanded="false" title="Menu">
    <i class="fa fa-chevron-left" id="toggle-icon"></i>
  </button>
</div>

{% else %}
<div class="container">
  <h1 class="visually-hidden">JupyterHub home page</h1>
  <div class="row">
    <div class="text-center">
      <a href="{{ base_url }}spawn"
         role="button"
         class="btn btn-lg btn-primary">
        Start My Server
      </a>
    </div>
  </div>
</div>
{% endif %}
{% endblock main %}

{% block script %}
{{ super() }}
{% if default_server.active %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const BASE_URL = "{{ base_url }}";
    const CURRENT_USER = "{{ user.name }}";
    const CSRF_TOKEN = window.jhdata && window.jhdata.xsrf_token;
    const LOAD_TIMEOUT_MS = 15000;

    const overlay    = document.getElementById("iframe-overlay");
    const loading    = document.getElementById("iframe-loading");
    const error      = document.getElementById("iframe-error");
    const iframe     = document.getElementById("user-app-frame");
    const panel      = document.getElementById("side-panel");
    const toggleIcon = document.getElementById("toggle-icon");

    // ---- loading overlay ----

    function startLoadTimer() {
        return setTimeout(function() {
            loading.style.display = "none";
            error.style.display = "block";
        }, LOAD_TIMEOUT_MS);
    }

    var loadTimer = startLoadTimer();

    iframe.onload = function() {
        clearTimeout(loadTimer);
        overlay.style.display = "none";
        try {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.querySelectorAll("a[target='_blank']").forEach(link => {
                link.removeAttribute("target");
            });
            iframe.contentWindow.open = function(url) {
                iframe.src = url;
            };
        } catch(e) {}
    };

    document.getElementById("iframe-reload").addEventListener("click", function() {
        error.style.display = "none";
        loading.style.display = "block";
        overlay.style.display = "flex";
        iframe.src = iframe.src;
        loadTimer = startLoadTimer();
    });

    // ---- side panel toggle ----

    function closePanel() {
        panel.classList.remove("expanded");
        document.getElementById("side-toggle").setAttribute("aria-expanded", "false");
        toggleIcon.className = "fa fa-chevron-left";
    }

    document.getElementById("side-toggle").addEventListener("click", function() {
        const expanded = panel.classList.toggle("expanded");
        this.setAttribute("aria-expanded", expanded);
        toggleIcon.className = expanded ? "fa fa-chevron-right" : "fa fa-chevron-left";
    });

    // ---- stop server ----

    document.getElementById("stop-server").addEventListener("click", function() {
        if (!confirm("Arrêter le serveur ?")) return;
        fetch(BASE_URL + "api/users/" + CURRENT_USER + "/server", {
            method: "DELETE",
            headers: {"X-XSRFToken": CSRF_TOKEN}
        }).then(function(response) {
            if (response.ok) {
                window.location.href = BASE_URL + "spawn";
            } else {
                response.text().then(function(text) {
                    console.error(text);
                    alert("Erreur lors de l'arrêt du serveur.");
                });
            }
        }).catch(function(err) {
            console.error(err);
            alert("Erreur lors de l'arrêt du serveur.");
        });
    });

    // ---- home: reset iframe to JupyterLab home ----

    document.getElementById("home-btn").addEventListener("click", function() {
        overlay.style.display = "flex";
        loading.style.display = "block";
        error.style.display = "none";
        iframe.src = BASE_URL + "user/" + CURRENT_USER + "/";
        loadTimer = startLoadTimer();
        closePanel();
    });
});
</script>
{% endif %}
{% endblock script %}
